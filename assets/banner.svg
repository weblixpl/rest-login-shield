<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
  <defs>
    <linearGradient id="banner-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1538"/>
      <stop offset="0.5" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="banner-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e40af" stroke-width="0.5" opacity="0.25"/>
    </pattern>
  </defs>

  <rect width="1544" height="500" fill="url(#banner-bg)"/>
  <rect width="1544" height="500" fill="url(#grid)"/>

  <!-- Left: Shield icon -->
  <g transform="translate(100, 100)">
    <path d="M150 20 L280 66 L280 170 C280 240 230 290 150 320 C70 290 20 240 20 170 L20 66 Z"
          fill="url(#banner-shield)" stroke="#60a5fa" stroke-width="4"/>
    <rect x="98" y="168" width="104" height="82" rx="10" fill="#f8fafc"/>
    <path d="M120 168 L120 136 C120 120 134 106 150 106 C166 106 180 120 180 136 L180 168"
          fill="none" stroke="#f8fafc" stroke-width="14" stroke-linecap="round"/>
    <circle cx="150" cy="200" r="10" fill="#1e40af"/>
    <rect x="146" y="200" width="8" height="28" fill="#1e40af"/>
  </g>

  <!-- Right: Title + tagline -->
  <g transform="translate(500, 200)">
    <text x="0" y="0" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="92" font-weight="800" fill="#f8fafc" letter-spacing="-2">
      REST &amp; Login Shield
    </text>
    <text x="4" y="64" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="32" font-weight="400" fill="#94a3b8" letter-spacing="0.5">
      Minimal hardening for WordPress — REST API &amp; brute force
    </text>
  </g>

  <!-- Code-like accent (representing REST endpoint) -->
  <g transform="translate(500, 340)" font-family="Menlo, Consolas, monospace" font-size="22" fill="#60a5fa">
    <text x="0" y="0" opacity="0.7">/wp-json/wp/v2/users/</text>
    <text x="340" y="0" fill="#f87171" opacity="0.9">→ 404</text>
    <text x="0" y="36" opacity="0.7">?author=1</text>
    <text x="340" y="36" fill="#f87171" opacity="0.9">→ 301</text>
  </g>
</svg>
